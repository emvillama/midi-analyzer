name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # Install everything from requirements.txt, skipping packages
          # that don't apply to Windows or need to be swapped out
          pip install `
            fastapi `
            uvicorn `
            pywebview `
            yt-dlp `
            pretty_midi `
            pydantic `
            "numpy<2" `
            "basic-pitch==0.4.0" `
            tensorflow `
            pyinstaller
        shell: pwsh

      - name: Locate basic-pitch model files
        id: model_path
        run: |
          $path = python -c "import basic_pitch; import os; print(os.path.dirname(basic_pitch.__file__))"
          echo "BASIC_PITCH_DIR=$path" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "midi-analyzer" `
            --add-data "frontend;frontend" `
            --add-data "backend;backend" `
            --add-data "bin;." `
            --add-data "${{ env.BASIC_PITCH_DIR }}/saved_models;basic_pitch/saved_models" `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            backend/main.py
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: midi-analyzer-windows
          path: dist/midi-analyzer.exe
          retention-days: 30